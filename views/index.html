<!DOCTYPE html>
<html>
<head>
  <title>American/British English Translator</title>
  <meta name="description" content="American and British English translator" />
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../public/style.css" type="text/css" />
</head>

<body>
  <main class="page-shell">
    <header class="app-header">
      <p class="eyebrow">FreeCodeCamp QA Project</p>
      <h1>American / British English Translator</h1>
    </header>

    <section class="container">
      <div class="form-container">
        <h2>Text to translate</h2>

        <textarea
          rows="10"
          cols="60"
          id="text-input"
          placeholder="Type a sentence, or try one of the examples below..."
        ></textarea>

        <div class="sample-row">
          <button type="button" class="sample-btn" data-locale="american-to-british" data-text="Mangoes are my favorite fruit.">
            American example
          </button>
          <button type="button" class="sample-btn" data-locale="british-to-american" data-text="We watched the footie match for a while.">
            British example
          </button>
        </div>

        <div class="controls-row">
          <select id="locale-select">
            <option value="american-to-british">American to British</option>
            <option value="british-to-american">British to American</option>
          </select>
          <input type="button" value="Translate" id="translate-btn" />
          <button type="button" id="clear-btn">Clear</button>
        </div>
      </div>

      <div id="output-container">
        <div id="solution-container">
          <h2>Translated Sentence:</h2>
          <div id="translated-sentence">Your translation will appear here.</div>
          <div id="error-msg"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="../public/index.js"></script>
</body>
</html>
